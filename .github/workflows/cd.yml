name: CD (Publish Test Images)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: selenium
            image: ghcr.io/${{ github.repository_owner }}/compar-selenium-tests
            dockerfile: tests/selenium/Dockerfile
          - name: cypress
            image: ghcr.io/${{ github.repository_owner }}/compar-cypress-tests
            dockerfile: tests/cypress/Dockerfile
          - name: playwright
            image: ghcr.io/${{ github.repository_owner }}/compar-playwright-tests
            dockerfile: tests/playwright/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
